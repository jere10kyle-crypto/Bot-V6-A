<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AutoMod{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <link rel="apple-touch-icon" href="/static/icon-192.png"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#5865f2"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0f14; --surface:#13161e; --card:#1a1d28; --border:#2a2d3e;
      --accent:#5865f2; --accent2:#eb459e; --green:#57f287; --red:#ed4245;
      --text:#e3e5f0; --muted:#72767d;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:1rem;
    }
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding:2rem; width:100%; max-width:380px;
    }
    .logo {
      font-family:'Space Mono',monospace; font-size:1.4rem; color:var(--accent);
      text-align:center; margin-bottom:0.4rem; font-weight:700;
    }
    .logo span { color:var(--accent2); }
    .sub { text-align:center; color:var(--muted); font-size:0.85rem; margin-bottom:1.5rem; }
    label { display:block; font-size:0.8rem; color:var(--muted); margin-bottom:0.3rem; margin-top:0.9rem; }
    input[type=text], input[type=password] {
      width:100%; padding:0.65rem 0.8rem; background:var(--surface);
      border:1px solid var(--border); border-radius:8px; color:var(--text);
      font-family:inherit; font-size:0.95rem;
    }
    input:focus { outline:none; border-color:var(--accent); }
    button {
      width:100%; margin-top:1.3rem; padding:0.7rem; border:none; border-radius:8px;
      background:var(--accent); color:white; font-weight:600; cursor:pointer;
      font-family:inherit; font-size:0.95rem;
    }
    button:hover { filter:brightness(1.1); }
    .alt { text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--muted); }
    .alt a { color:var(--accent); text-decoration:none; }
    .alt a:hover { text-decoration:underline; }
    .flash {
      padding:0.6rem 0.8rem; border-radius:8px; margin-bottom:1rem; font-size:0.85rem;
    }
    .flash.error { background:rgba(237,66,69,0.15); color:var(--red); border:1px solid var(--red); }
    .flash.ok    { background:rgba(87,242,135,0.12); color:var(--green); border:1px solid var(--green); }
    .badge-info {
      background:rgba(88,101,242,0.15); border:1px solid var(--accent); color:var(--accent);
      padding:0.5rem 0.7rem; border-radius:8px; font-size:0.8rem; margin-bottom:1rem; text-align:center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Auto<span>Mod</span></div>
    <div class="sub">{% block sub %}{% endblock %}</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
